<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beanthentic | Sign Up</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/signup.css" />
  </head>

  <body class="login-page">
    <main id="main" class="login-main">
      <div class="login-wrap">
        <section class="card signup-card-split" aria-label="Sign up form">
          <div class="signup-card-left" aria-hidden="true">
            <img
              src="../assets/images/logo.png"
              alt="Beanthentic logo"
              class="signup-card-logo"
            />
          </div>

          <div class="signup-card-right">
            <div class="card-header">
              <h2 class="card-title">Create Admin Account</h2>
              <p class="card-desc">Enter your details to sign up.</p>
            </div>

            <form class="form" action="/signup" method="post" novalidate>
              {% if error %}
              <p class="fineprint" style="color: #c0392b">{{ error }}</p>
              {% endif %}
              {% if success %}
              <p class="fineprint" style="color: #1e8449">{{ success }}</p>
              {% endif %}
              <div class="field">
                <label class="label" for="fullName">Full Name</label>
                <input
                  class="input"
                  id="fullName"
                  name="fullName"
                  type="text"
                  autocomplete="name"
                  placeholder="Juan Dela Cruz"
                  required
                />
              </div>

              <div class="field">
                <label class="label" for="email">Email</label>
                <input
                  class="input"
                  id="email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  placeholder="you@example.com"
                  required
                />
              </div>

              <div class="field">
                <label class="label" for="password">Password</label>
                <input
                  class="input"
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="new-password"
                  placeholder="••••••••"
                  required
                />
              </div>

              <div class="field">
                <label class="label" for="confirmPassword">Confirm Password</label>
                <input
                  class="input"
                  id="confirmPassword"
                  name="confirmPassword"
                  type="password"
                  autocomplete="new-password"
                  placeholder="••••••••"
                  required
                />
              </div>

              <button class="btn" type="submit">Sign up</button>

              <p class="fineprint">
                Already have an account?
                <a class="link" href="/login">Log in</a>
              </p>
            </form>
          </div>
        </section>
      </div>
    </main>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
