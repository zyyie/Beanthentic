<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beanthentic | Login</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/login.css" />
  </head>

  <body>
    <header>
      <div class="nav">
        <a href="../index.html" class="logo" aria-label="Beanthentic home">
          <img
            src="../assets/images/logo.png"
            alt="Beanthentic logo"
            class="logo-img"
          />
          <span>Beanthentic</span>
        </a>
        <nav class="nav-links" aria-label="Primary">
          <a href="../index.html">Home</a>
          <a href="../about.html">About Us</a>
        </nav>
      </div>
    </header>

    <main id="main" class="login-main">
      <div class="login-wrap">
        <section class="card" aria-label="Login form">
          <div class="card-header">
            <h2 class="card-title">Welcome Admin!</h2>
            <p class="card-desc">Enter your details to Log in.</p>
          </div>

          <form class="form" action="#" method="post" novalidate>
            <div class="field">
              <label class="label" for="email">Email</label>
              <input
                class="input"
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                placeholder="you@example.com"
                required
              />
            </div>

            <div class="field">
              <div class="label-row">
                <label class="label" for="password">Password</label>
                <a class="link subtle" href="../forgot-password.html"
                  >Forgot?</a
                >
              </div>
              <input
                class="input"
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="••••••••"
                required
              />
            </div>

            <div class="row">
              <label class="checkbox">
                <input type="checkbox" name="remember" />
                <span>Remember me</span>
              </label>
            </div>

            <button class="btn" type="submit">Log in</button>

            <p class="fineprint">
              Don’t have an account?
              <a class="link" href="../signup.html">Create one</a>
            </p>
          </form>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <small>© <span id="year"></span> Beanthentic. All rights reserved.</small>
      </div>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
