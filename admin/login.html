<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beanthentic | Login</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/login.css" />
  </head>

  <body class="login-page">
    <main id="main" class="login-main">
      <div class="login-wrap">
        <section class="card login-card-split" aria-label="Login form">
          <div class="login-card-left" aria-hidden="true">
            <img
              src="../assets/images/logo.png"
              alt="Beanthentic logo"
              class="login-card-logo"
            />
          </div>

          <div class="login-card-right">
            <div class="card-header">
              <h2 class="card-title">Welcome Admin!</h2>
              <p class="card-desc">Enter your details to Log in.</p>
            </div>

            <form class="form" action="/login" method="post" novalidate>
              {% if error %}
              <p class="fineprint" style="color: #c0392b">{{ error }}</p>
              {% endif %}
              <div class="field">
                <label class="label" for="email">Email</label>
                <input
                  class="input"
                  id="email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  placeholder="you@example.com"
                  required
                />
              </div>

              <div class="field">
                <div class="label-row">
                  <label class="label" for="password">Password</label>
                  <a class="link subtle" href="../forgot-password.html"
                    >Forgot?</a
                  >
                </div>
                <input
                  class="input"
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="••••••••"
                  required
                />
              </div>

              <div class="row">
                <label class="checkbox">
                  <input type="checkbox" name="remember" />
                  <span>Remember me</span>
                </label>
              </div>

              <button class="btn" type="submit">Log in</button>

              <p class="fineprint">
                Don’t have an account?
                <a class="link" href="/signup">Create one</a>
              </p>
            </form>
          </div>
        </section>
      </div>
    </main>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
