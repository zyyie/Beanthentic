<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beanthentic | Forgot Password</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/login.css" />
  </head>

  <body class="login-page">
    <main id="main" class="login-main">
      <div class="login-wrap">
        <section class="card login-card-split" aria-label="Forgot password form">
          <div class="login-card-left" aria-hidden="true">
            <img
              src="../assets/images/logo.png"
              alt="Beanthentic logo"
              class="login-card-logo"
            />
          </div>

          <div class="login-card-right">
            <div class="card-header">
              <h2 class="card-title">Forgot Password?</h2>
              <p class="card-desc">Enter your phone number to reset your password.</p>
            </div>

            <form class="form" id="forgotPasswordForm" action="{{ url_for('forgot_password') }}" method="post" novalidate>
              {% if error %}
              <p class="fineprint" style="color: #c0392b">{{ error }}</p>
              {% endif %}

              {% if success %}
              <p class="fineprint" style="color: #27ae60">{{ success }}</p>
              {% endif %}

              <div class="field">
                <label class="label" for="phone">Phone Number:</label>
                <div class="input-group">
                  <span class="input-prefix">+63</span>
                  <input
                    class="input"
                    id="phone"
                    name="phone"
                    type="text"
                    autocomplete="username"
                    placeholder="9123456789"
                    required
                  />
                </div>
              </div>

              <button class="btn" type="submit">RESET PASSWORD</button>

              <div class="login-form-footer">
                <p class="fineprint">
                  Remember your password? <a class="link" href="{{ url_for('login') }}">Back to Login</a>
                </p>
              </div>
            </form>
          </div>
        </section>
      </div>
    </main>
    <script>
      (function () {
        // Phone number validation
        const phoneInput = document.getElementById("phone");
        if (phoneInput) {
          phoneInput.addEventListener("input", function (e) {
            // Remove any non-numeric characters
            let value = e.target.value.replace(/\D/g, '');
            
            // Limit to 10 digits (Philippines mobile number format)
            if (value.length > 10) {
              value = value.slice(0, 10);
            }
            
            e.target.value = value;
          });

          phoneInput.addEventListener("keydown", function (e) {
            // Allow: backspace, delete, tab, escape, enter
            if ([8, 9, 27, 13].indexOf(e.keyCode) !== -1 ||
                // Allow: Ctrl+A, Ctrl+C, Ctrl+V, Ctrl+X
                (e.keyCode === 65 && (e.ctrlKey === true || e.metaKey === true)) ||
                (e.keyCode === 67 && (e.ctrlKey === true || e.metaKey === true)) ||
                (e.keyCode === 86 && (e.ctrlKey === true || e.metaKey === true)) ||
                (e.keyCode === 88 && (e.ctrlKey === true || e.metaKey === true)) ||
                // Allow: home, end, left, right
                (e.keyCode >= 35 && e.keyCode <= 39)) {
              // let it happen, don't do anything
              return;
            }
            
            // Ensure that it is a number and stop the keypress
            if ((e.shiftKey || (e.keyCode < 48 || e.keyCode > 57)) && (e.keyCode < 96 || e.keyCode > 105)) {
              e.preventDefault();
            }
          });
        }
      })();
    </script>
  </body>
</html>
