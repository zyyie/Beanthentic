<div class="settings-card">
  <h3>Profile Actions</h3>
  <p style="margin-top: -0.25rem; color: #6c757d; font-size: 0.95rem;">
    Update your profile info and manage your session access.
  </p>

  <form id="profileForm">
    <div class="form-group">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" name="fullName" value="Admin" required />
    </div>

    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input type="text" id="phone" name="phone" value="09123456789" readonly />
      <small>Phone number cannot be changed</small>
    </div>

    <button type="submit" class="btn btn-primary">Update</button>
  </form>

  <div style="height: 0.75rem;"></div>

  <div style="display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; justify-content: flex-start;">
    <button type="button" class="btn btn-secondary" id="refreshSessionBtn">Refresh Session</button>
    <button type="button" class="btn btn-danger" id="logoutBtn" style="padding: 0.65rem 1.25rem;">
      Log Out
    </button>
  </div>
</div>
