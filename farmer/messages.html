<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beanthentic | Farmer Messages</title>

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/messaging-module.css" />
    <link rel="stylesheet" href="../css/farmer-messaging.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body class="farmer-messaging-page">
    <header class="farmer-messaging-header">
      <div class="farmer-messaging-header__brand">
        <img src="../assets/images/logo.png" alt="Beanthentic" class="farmer-messaging-header__logo" />
        <div>
          <div class="farmer-messaging-header__title">Messages</div>
          <div class="farmer-messaging-header__sub">
            Logged in as <strong>{{ farmer_name }}</strong> (+63{{ farmer_phone }})
          </div>
        </div>
      </div>
      <a class="farmer-messaging-header__logout" href="{{ url_for('farmer_logout') }}">Logout</a>
    </header>

    <main class="farmer-messaging-main">
      <section class="module-header">
        <h1>Messaging</h1>
        <p>Open a message from admin and reply below.</p>
      </section>

      <div class="messaging-layout">
        <aside class="messaging-sidebar">
          <div class="messaging-sidebar__header">
            <button type="button" class="messaging-compose-btn" id="messagingComposeBtn">
              <i class="fa-solid fa-pen-to-square"></i>
              <span>New Message</span>
            </button>
          </div>

          <ul class="messaging-folders" id="messagingFolders">
            <li class="messaging-folder-item is-active" data-folder="inbox">
              <i class="fa-solid fa-inbox"></i>
              <span>Inbox</span>
              <span class="messaging-folder-badge" id="messagingInboxBadge"></span>
            </li>
            <li class="messaging-folder-item" data-folder="sent">
              <i class="fa-solid fa-paper-plane"></i>
              <span>Sent</span>
            </li>
            <li class="messaging-folder-item" data-folder="starred">
              <i class="fa-solid fa-star"></i>
              <span>Starred</span>
            </li>
            <li class="messaging-folder-item" data-folder="archived">
              <i class="fa-solid fa-box-archive"></i>
              <span>Archived</span>
            </li>
          </ul>
        </aside>

        <div class="messaging-main" id="messagingMain">
          <div class="messaging-toolbar">
            <div class="messaging-search-field">
              <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
              <input type="search" id="messagingSearchInput" placeholder="Search messages…" autocomplete="off" />
            </div>
            <div class="messaging-toolbar-actions">
              <button type="button" class="messaging-toolbar-btn" id="messagingRefreshBtn" title="Refresh">
                <i class="fa-solid fa-rotate-right"></i>
                <span>Refresh</span>
              </button>
              <button type="button" class="messaging-toolbar-btn" id="messagingMarkAllReadBtn" title="Mark all as read">
                <i class="fa-solid fa-check-double"></i>
                <span>Mark all read</span>
              </button>
            </div>
          </div>

          <div class="messaging-list-pane">
            <ul class="messaging-list" id="messagingList">
              <li class="messaging-loading">
                <i class="fa-solid fa-spinner"></i>
                <span>Loading messages…</span>
              </li>
            </ul>
          </div>

          <div class="messaging-detail-pane" id="messagingDetailPane">
            <div class="messaging-detail" id="messagingDetail">
              <div class="messaging-detail__header">
                <button type="button" class="messaging-detail__back-btn" id="messagingDetailBackBtn">
                  <i class="fa-solid fa-arrow-left"></i>
                  <span>Back</span>
                </button>
                <h2 class="messaging-detail__subject" id="messagingDetailSubject"></h2>
                <div class="messaging-detail__meta-row">
                  <div class="messaging-detail__sender-info">
                    <div class="messaging-detail__sender-avatar" id="messagingDetailAvatar"></div>
                    <div>
                      <div class="messaging-detail__sender-name" id="messagingDetailSenderName"></div>
                      <div class="messaging-detail__sender-phone" id="messagingDetailSenderPhone"></div>
                    </div>
                  </div>
                  <div class="messaging-detail__timestamp" id="messagingDetailTimestamp"></div>
                </div>
                <div class="messaging-detail__actions">
                  <button type="button" class="messaging-detail__action-btn" id="messagingDetailStarBtn">
                    <i class="fa-solid fa-star"></i>
                    <span>Star</span>
                  </button>
                  <button type="button" class="messaging-detail__action-btn" id="messagingDetailArchiveBtn">
                    <i class="fa-solid fa-archive"></i>
                    <span>Archive</span>
                  </button>
                  <button type="button" class="messaging-detail__action-btn messaging-detail__action-btn--danger" id="messagingDetailDeleteBtn">
                    <i class="fa-solid fa-trash-can"></i>
                    <span>Delete</span>
                  </button>
                </div>
              </div>

              <div class="messaging-conversation" id="messagingDetailBody">
                <div class="messaging-list-empty">
                  <i class="fa-solid fa-comments"></i>
                  <p>Select a message to read and reply.</p>
                </div>

                <div class="messaging-conversation__reply" id="messagingConversationReply">
                  <div class="messaging-reply-input-wrapper">
                    <textarea class="messaging-reply-input" id="msgInlineReplyInput" placeholder="Type your message here..." rows="1"></textarea>
                    <button type="button" class="messaging-reply-send" id="msgInlineReplySendBtn" title="Send message">
                      <i class="fa-solid fa-paper-plane"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="messaging-compose-overlay" id="messagingComposeOverlay">
        <div class="messaging-compose-card">
          <div class="messaging-compose-header">
            <h2><i class="fa-solid fa-pen-to-square"></i> New Message</h2>
            <button type="button" class="messaging-compose-close" id="messagingComposeClose">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
          <form id="messagingComposeForm">
            <div class="messaging-compose-body">
              <div class="messaging-compose-field">
                <label for="msgComposeRecipient">Recipient (admin phone)</label>
                <input type="text" id="msgComposeRecipient" placeholder="Leave blank to send to all admins" autocomplete="off" />
              </div>
              <div class="messaging-compose-field">
                <label for="msgComposeSubject">Subject</label>
                <input type="text" id="msgComposeSubject" placeholder="Message subject" required autocomplete="off" />
              </div>
              <div class="messaging-compose-field">
                <label for="msgComposeBody">Message</label>
                <textarea id="msgComposeBody" placeholder="Type your message here…" required></textarea>
              </div>
            </div>
            <div class="messaging-compose-footer">
              <button type="button" class="messaging-compose-cancel" id="messagingComposeCancel">Cancel</button>
              <button type="submit" class="messaging-compose-send" id="messagingComposeSend">
                <i class="fa-solid fa-paper-plane"></i>
                <span>Send Message</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script>
      window.__BEANTHENTIC_USER__ = { phone: "{{ farmer_phone }}", full_name: "{{ farmer_name }}" };
    </script>
    <script src="../js/farmer-messaging.js"></script>
  </body>
</html>
