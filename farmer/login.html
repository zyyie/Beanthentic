<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beanthentic | Farmer Login</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body class="login-page">
    <main id="main" class="login-main">
      <div class="login-wrap">
        <section class="card login-card-split" aria-label="Farmer login form">
          <div class="login-card-left" aria-hidden="true">
            <img src="../assets/images/logo.png" alt="Beanthentic logo" class="login-card-logo" />
          </div>

          <div class="login-card-right">
            <div class="card-header">
              <h2 class="card-title">Farmer Portal</h2>
              <p class="card-desc">Log in to view and reply to messages.</p>
            </div>

            <form class="form" action="{{ url_for('farmer_login') }}" method="post" novalidate>
              {% if error %}
              <p class="fineprint" style="color: #c0392b">{{ error }}</p>
              {% endif %}

              <div class="field">
                <label class="label" for="name">Name (optional):</label>
                <input class="input" id="name" name="name" type="text" autocomplete="name" placeholder="Juan Dela Cruz" />
              </div>

              <div class="field">
                <label class="label" for="phone">Phone Number:</label>
                <div class="input-group">
                  <span class="input-prefix">+63</span>
                  <input class="input" id="phone" name="phone" type="text" autocomplete="tel" placeholder="9123456789" required />
                </div>
              </div>

              <button class="btn" type="submit">LOGIN</button>
            </form>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
