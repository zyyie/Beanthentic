<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beanthentic Coffee</title>
  
  <!-- CSS Files -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <!-- Icon library -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <!-- Header Component -->
  <div id="header-component"></div>

  <main>
    <!-- Hero Component -->
    <div id="hero-component"></div>

    <!-- About Component -->
    <div id="about-component"></div>
  </main>

  <!-- Footer Component -->
  <div id="footer-component"></div>

  <!-- JavaScript Files -->
  <script src="js/main.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/ui.js"></script>
  
  <!-- Component Loader -->
  <script>
    // Load HTML components
    async function loadComponents() {
      try {
        const components = [
          { id: 'header-component', file: 'components/header.html' },
          { id: 'hero-component', file: 'components/hero.html' },
          { id: 'about-component', file: 'components/about.html' },
          { id: 'footer-component', file: 'components/footer.html' }
        ];

        for (const component of components) {
          const response = await fetch(component.file);
          const html = await response.text();
          document.getElementById(component.id).innerHTML = html;
        }
      } catch (error) {
        console.error('Error loading components:', error);
      }
    }

    // Load components when DOM is ready
    document.addEventListener('DOMContentLoaded', loadComponents);
  </script>
</body>
</html>
