<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beanthentic Coffee</title>
  
  <!-- CSS Files -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Header Component -->
  <div id="header-component"></div>

  <main>
    <!-- Hero Component -->
    <div id="hero-component"></div>

    <!-- About Component -->
    <div id="about-component"></div>
  </main>

  <!-- Footer Component -->
  <div id="footer-component"></div>

  <!-- JavaScript Files -->
  <script src="js/main.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/ui.js"></script>
  
  <!-- Component Loader -->
  <script>
    // Load HTML components
    async function loadComponents() {
      try {
        const components = [
          { id: 'header-component', file: 'components/header.html' },
          { id: 'hero-component', file: 'components/hero.html' },
          { id: 'about-component', file: 'components/about.html' },
          { id: 'footer-component', file: 'components/footer.html' }
        ];

        for (const component of components) {
          const response = await fetch(component.file);
          const html = await response.text();
          document.getElementById(component.id).innerHTML = html;
        }

        // Re-initialize UI pieces that depend on loaded components
        if (window.uiController) {
          window.uiController.setupHeroSlider();
          window.uiController.setupAnimations();
          window.uiController.setupInteractions();
        }
      } catch (error) {
        console.error('Error loading components:', error);
      }
    }

    // Load components when DOM is ready
    document.addEventListener('DOMContentLoaded', loadComponents);
  </script>
</body>
</html>
